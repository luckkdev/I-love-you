<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eu te amo GIGI 🤍</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

       
  <div class="sky" id="sky"></div>

  <main class="stage">
    <section class="card" id="card">
      <div class="tape tape-left"></div>
      <div class="tape tape-right"></div>
      <div class="card-inner">
        <p class="line line-1">GIGI</p>
        <p class="line line-2">Namora</p>
        <p class="line line-3">Comigo? <span class="heart-big">❤</span></p>

        <img
          class="mascot"
          src="hellokitty.png"
          alt=""
          onerror="this.style.display='none'; document.getElementById('mascot-hint').style.display='flex';"
        >
        <div class="mascot-hint" id="mascot-hint">
          <span>📷</span>
          <p>Salve sua imagem<br>como <code>hellokitty.png</code><br>na mesma pasta</p>
        </div>
      </div>
    </section>

    <button class="pop-btn" id="popBtn">espalhar corações 🤍</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
